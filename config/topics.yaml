# AI News Monitor - Topic Registry
# Defines the topics to monitor and their keyword signals for classification and scoring.
# Each topic has a set of keywords used for:
#   1. relevance scoring (ranker.py)
#   2. category classification (classifier.py)
#   3. filtering Semafor's general RSS feed

