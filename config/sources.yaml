  - curl -L "https://huggingface.co/blog"
- id: arstechnica_ai
  name: Ars Technica AI
  enabled: true
  trust_weight: 0.85
  source_type: reported
  homepage_url: https://arstechnica.com/
  section_url: https://arstechnica.com/ai/
  feed_url: https://arstechnica.com/ai/feed/
  access_method: rss_with_ua
  requires_user_agent: true
  article_url_patterns:
  - https://arstechnica.com/ai/*
  - https://arstechnica.com/information-technology/*
  listing_strategy: rss
  parser_type: rss_standard
  notes: 'HTML and feed blocked from headless fetch without UA. RSS feed at /ai/feed/
    is well-documented and reliable with a standard browser User-Agent. feedparser
    handles this well. Feed may also appear at feeds.arstechnica.com/arstechnica/index
    for full-site feed. Degrade gracefully on 403/timeout.

    '
  curl_examples:
  - curl -L -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML,
    like Gecko) Chrome/120.0.0.0 Safari/537.36" "https://arstechnica.com/ai/feed/"
  - curl -L -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML,
    like Gecko) Chrome/120.0.0.0 Safari/537.36" "https://arstechnica.com/ai/"
- id: techcrunch_ai
  name: TechCrunch Artificial Intelligence
  enabled: true
  trust_weight: 0.85
  source_type: reported
  homepage_url: https://techcrunch.com/
  section_url: https://techcrunch.com/category/artificial-intelligence/
  feed_url: https://techcrunch.com/category/artificial-intelligence/feed/
  access_method: rss
  requires_user_agent: false
  article_url_patterns:
  - https://techcrunch.com/*/artificial-intelligence*
  - https://techcrunch.com/[0-9][0-9][0-9][0-9]/*
  listing_strategy: rss
  parser_type: rss_standard
  notes: 'RSS feed validated and working. Article URLs follow pattern /YYYY/MM/DD/article-slug/.
    Site uses Turnstile bot protection on HTML pages but the RSS feed is accessible
    without UA tricks. High volume feed.

    '
  curl_examples:
  - curl -L "https://techcrunch.com/category/artificial-intelligence/feed/"
  - curl -L -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML,
    like Gecko) Chrome/120.0.0.0 Safari/537.36" "https://techcrunch.com/category/artificial-intelligence/"
