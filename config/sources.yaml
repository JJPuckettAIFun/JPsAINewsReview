sources:
- id: openai_news
  name: OpenAI News
  enabled: true
  trust_weight: 1.0
  source_type: official
  homepage_url: https://openai.com/
  section_url: https://openai.com/news/
  feed_url: https://openai.com/news/rss.xml
  access_method: rss
  requires_user_agent: false
  article_url_patterns:
  - https://openai.com/index/*
  - https://openai.com/news/*
  - https://openai.com/academy/*
  - https://openai.com/research/*
  listing_strategy: rss
  parser_type: rss_standard
  notes: 'HTML pages return 403. RSS feed at /news/rss.xml is validated and working.
    Feed mixes news, research, and academy (tutorial) posts; classifier will handle
    topic relevance filtering. Article links use /index/, /news/, and occasionally
    /academy/ paths.

    '
  curl_examples:
  - curl -L "https://openai.com/news/rss.xml"
  - curl -L "https://openai.com/news/"
- id: openai_research
  name: OpenAI Research
  enabled: false
  trust_weight: 1.0
  source_type: official
  homepage_url: https://openai.com/
  section_url: https://openai.com/research/
  feed_url: https://openai.com/news/rss.xml
  access_method: rss
  requires_user_agent: false
  article_url_patterns:
  - https://openai.com/research/*
  - https://openai.com/index/*
  listing_strategy: rss
  parser_type: rss_standard
  notes: 'OpenAI does not publish a separate research RSS. Shares the same feed as
    openai_news. The pipeline will deduplicate across these two source IDs. Research
    posts typically appear at /research/ or /index/ paths.

    '
  curl_examples:
  - curl -L "https://openai.com/news/rss.xml"
- id: anthropic_news
  name: Anthropic News
  enabled: true
  trust_weight: 1.0
  source_type: official
  homepage_url: https://www.anthropic.com/
  section_url: https://www.anthropic.com/news
  feed_url: null
  access_method: html_nextjs
  requires_user_agent: false
  article_url_patterns:
  - https://www.anthropic.com/news/*
  - https://www.anthropic.com/*
  listing_strategy: html_nextjs
  parser_type: anthropic
  notes: 'No official RSS feed. Site is Next.js SSR; article metadata is embedded
    in __NEXT_DATA__ script tag as inline JSON. Parser extracts article list from
    serialized page props. Articles may appear at /news/[slug] or top-level /[slug]
    paths. Validated 2026-04-12; no anti-bot blocking detected.

    '
  curl_examples:
  - curl -L "https://www.anthropic.com/news"
  - curl -L -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" "https://www.anthropic.com/news"
- id: anthropic_research
  name: Anthropic Research
  enabled: true
  trust_weight: 1.0
  source_type: official
  homepage_url: https://www.anthropic.com/
  section_url: https://www.anthropic.com/research
  feed_url: null
  access_method: html_nextjs
  requires_user_agent: false
  article_url_patterns:
  - https://www.anthropic.com/research/*
  listing_strategy: html_nextjs
  parser_type: anthropic
  notes: 'No official RSS feed. Same Next.js structure as anthropic_news. Page lists
    60+ publications with dates and category tags. Uses same parser_type.

    '
  curl_examples:
  - curl -L "https://www.anthropic.com/research"
