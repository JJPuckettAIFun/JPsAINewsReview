  access_method: html
  requires_user_agent: true
  article_url_patterns:
  - https://www.theinformation.com/articles/*
  listing_strategy: html_listing
  parser_type: theinformation
  notes: 'DISABLED. Hard paywall requiring login + subscription. Bot detection via
    Cloudflare and reCAPTCHA. Content is not accessible without authentication. RSS
    feed exists at /feed but article body content is paywalled. Only titles and summaries
    may be available without a subscription. Enable only if you have valid session
    credentials and a plan to handle authentication.

    '
  curl_examples:
  - curl -L "https://www.theinformation.com/"
  - '# Full content requires authentication; not suitable for automated access'
