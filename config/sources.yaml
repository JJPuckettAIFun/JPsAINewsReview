- id: wired_ai
  name: WIRED Artificial Intelligence
  enabled: true
  trust_weight: 0.8
  source_type: reported
  homepage_url: https://www.wired.com/
  section_url: https://www.wired.com/tag/artificial-intelligence/
  feed_url: https://www.wired.com/feed/tag/ai/latest/rss
  access_method: rss_with_ua
  requires_user_agent: true
  article_url_patterns:
  - https://www.wired.com/story/*
  - https://www.wired.com/*
  listing_strategy: rss
  parser_type: rss_standard
  notes: 'WIRED blocks headless fetches. RSS feed at /feed/tag/ai/latest/rss is documented
    in community sources and the Feeder RSS reader. Requires a browser-like User-Agent.
    Alternative: /feed/category/artificial-intelligence/rss. Degrade gracefully if
    blocked (HTTP 403 or 429). Mark source as failed in source_health if consecutive
    failures exceed threshold.

    '
  curl_examples:
  - curl -L -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML,
    like Gecko) Chrome/120.0.0.0 Safari/537.36" "https://www.wired.com/feed/tag/ai/latest/rss"
  - curl -L -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML,
    like Gecko) Chrome/120.0.0.0 Safari/537.36" "https://www.wired.com/tag/artificial-intelligence/"
- id: the_information
  name: The Information
  enabled: false
  trust_weight: 0.9
